<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 4rem;
            color: #ff6b6b;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }

        .music-player {
            text-align: center;
            margin-bottom: 40px;
        }

        audio {
            width: 300px;
            height: 50px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .media-item {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .media-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .media-item video,
        .media-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .caption {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #ff6b6b;
            background: rgba(255, 255, 255, 0.9);
        }

        .cake {
            text-align: center;
            margin: 40px 0;
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .message {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-size: 1.2rem;
            color: #333;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            audio {
                width: 250px;
            }
        }

        /* Confetti effect */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div class="confetti" id="confetti"></div>

    <div class="container">
        <h1>🎉 Happy Birthday one! 🎉</h1>

        <div class="music-player">
            <audio controls autoplay loop>
                <source src="1374493441.mp3">

                Your browser doesn't support audio.
            </audio>
            <p style="color: white; margin-top: 10px;">🎵 Click to play/pause 🎵</p>
        </div>

        <div class="message">
            Wishing you the happiest birthday ever! May all your dreams come true. Love you! ❤️
        </div>
        <div class="gallery">
            <div class="media-item">
                <img src="photo_2026-04-14_04-58-45.jpg">
                <div class="caption">Beautiful memories! 📸</div>
            </div>
            <div class="media-item">
                <video controls>
                    <source src="video_2026-04-14_04-59-04.mp4">
                </video>
                <div class="caption">Special moment! 🎥</div>
            </div>
            <div class="media-item">
                <img src="photo_2026-04-14_04-59-30.jpg">
                <div class="caption">Celebration time! 🥳</div>
            </div>
            <div class="media-item">
                <video controls>
                    <source src="video_2026-04-14_04-59-23.mp4">
                </video>
                <div class="caption">Fun times! 😄</div>
            </div>

            <div class="media-item">
                <img src="photo_2026-04-14_04-58-45.jpg">
                <div class="caption">Beautiful memories! 📸</div>
            </div>
        </div>

        <div class="cake">🎂🥳🎈</div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Confetti explosion on load
        window.addEventListener('load', () => {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        });

        // Additional confetti on click
        document.addEventListener('click', () => {
            confetti({
                particleCount: 50,
                spread: 60,
                origin: { x: Math.random(), y: Math.random() }
            });
        });

        // Smooth scroll and mobile optimizations
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>

</html>
